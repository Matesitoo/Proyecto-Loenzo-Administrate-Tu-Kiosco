<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Adminístrate tu Kiosco</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script>
        if (localStorage.getItem("sesionActiva") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <nav class="sidebar">
        <h2>Adminístrate tu Kiosco</h2>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="ventas.html" class="active">Ventas</a>
        <a href="historial.html">Historial</a>
        <a href="reportes.html">Reportes</a>
        <a href="proveedores.html">Proveedores</a>
        <a href="pedidos.html">Pedidos</a>
        <a href="caja.html">Caja</a>
        <a href="calculadora.html">Calculadora</a>
        <a href="#" onclick="cerrarSesion()" style="margin-top: 30px; background: #dc2626; color: white;">Cerrar Sesion</a>
    </nav>

    <main class="contenido-principal">
        <h1 class="titulo">Nueva Venta</h1>

        <div class="card">
            <div class="formulario">
                <input type="text" id="busqueda" placeholder="Buscar producto...">
                <input type="number" id="cantidad" placeholder="Cantidad">
                <button onclick="agregarAlCarrito()">Agregar al carrito</button>
            </div>
            <div id="infoProducto"></div>
        </div>

        <br>

        <div class="card">
            <h2>Carrito de Compras</h2>
            
            <div style="margin-bottom:15px;">
                <label>Metodo de pago: </label>
                <select id="metodoPago">
                    <option value="efectivo">Efectivo</option>
                    <option value="tarjeta">Tarjeta</option>
                    <option value="transferencia">Transferencia</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Subtotal</th>
                        <th>Accion</th>
                    </tr>
                </thead>
                <tbody id="tablaCarrito"></tbody>
            </table>

            <br>
            <h2 id="totalGeneral">Total: $0</h2>
            <br>
            <button onclick="finalizarVenta()">Finalizar Venta</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ventas.js"></script>
</body>
</html>
