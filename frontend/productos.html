<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Productos - Adminístrate tu Kiosco</title>

    <link
        rel="stylesheet"
        href="css/estilos.css">

    <script>
    if (localStorage.getItem("sesionActiva") !== "true") {
        window.location.href = "login.html";
    }
    </script>

</head>

<body>

<nav class="sidebar">

    <h2>Adminístrate tu Kiosco</h2>

    <a href="index.html">Inicio</a>

    <a href="productos.html">Productos</a>

    <a href="ventas.html">Ventas</a>

    <a href="historial.html">Historial</a>

    <a href="#" onclick="cerrarSesion()" style="margin-top: 30px; background: #dc2626; color: white;">Cerrar Sesión</a>

    <script>
    function cerrarSesion() {
        localStorage.removeItem("sesionActiva");
        localStorage.removeItem("nombreUsuario");
        window.location.href = "login.html";
    }
    </script>
</nav>

<main class="contenido-principal">

    <h1 class="titulo">
        Gestión de Productos
    </h1>

    <div class="card">

        <div class="formulario">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre del producto">

            <input
                type="number"
                id="precio"
                placeholder="Precio">

            <input
                type="number"
                id="stock"
                placeholder="Stock">

            <button onclick="agregarProducto()">
                Agregar
            </button>

        </div>

    </div>

    <br>

    <table>

        <thead>

            <tr>

                <th>Producto</th>

                <th>Precio</th>

                <th>Stock</th>

                <th>Acciones</th>

            </tr>

        </thead>

        <tbody id="tablaProductos">

        </tbody>

    </table>

</main>

<script src="js/productos.js"></script>

</body>
</html>
